name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
      - name: Pytest
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
      - name: Validate data
        run: |
          python -m money_map validate --data-dir data
