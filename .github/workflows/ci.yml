name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .
      - name: Pytest
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
      - name: Validate data
        run: |
          python -m money_map validate --data-dir data
      - name: i18n audit
        run: |
          python -m money_map i18n audit --strict --data-dir data
      - name: Data dictionary
        run: |
          python -m money_map data docs --data-dir data --out docs/data_dictionary.md
      - name: Recommend sample
        run: |
          money-map recommend --profile profiles/demo_fast_start.yaml --top 5 --lang en
      - name: Doctor
        run: |
          money-map doctor --data-dir data --lang en
      - name: Export sample
        run: |
          money-map export --profile profiles/demo_fast_start.yaml --out exports --lang en --today 2026-01-01
