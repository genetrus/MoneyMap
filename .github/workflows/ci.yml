name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          python -m ruff check .
      - name: Pytest
        run: |
          python -m pytest
      - name: Validate data
        run: |
          money-map validate --data-dir data
