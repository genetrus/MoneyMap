    applies_if:
      tags_any: [service, product, inventory]
    effects:
      add_kits: [pl.invoicing]
      add_checklist:
        - rulepack.pl.verify.invoicing
  - rule_id: pl.data.coverage
    title_key: rule.pl.data.title
    summary_key: rule.pl.data.summary
    applies_if:
      tags_any: [remote, automation]
    effects:
      add_kits: [pl.data_protection]
      add_checklist:
        - rulepack.pl.verify.data_protection
  - rule_id: pl.employment.contracting
    title_key: rule.pl.employment.title
    summary_key: rule.pl.employment.summary
    applies_if:
      tags_any: [community, service]
    effects:
      add_kits: [pl.employment, pl.insurance]
      add_checklist:
        - rulepack.pl.verify.employment
        - rulepack.pl.verify.insurance
