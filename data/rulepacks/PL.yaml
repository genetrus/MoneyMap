country_code: PL
reviewed_at: "2025-02-10"
is_placeholder: true
placeholder_notice_key: rulepack.placeholder.notice
rules:
  - rule_id: pl.regulated.verify
    title_key: rule.pl.regulated.title
    summary_key: rule.pl.regulated.summary
    applies_if:
      tags_any: [regulated, finance, health]
    effects:
      add_kits: [pl.registration, pl.taxes, pl.permits]
      add_blockers: [reason.review.requires_verification, reason.legal.placeholder_rulepack]
      add_checklist:
        - rulepack.pl.verify.registration
        - rulepack.pl.verify.taxes
        - rulepack.pl.verify.permits
  - rule_id: pl.invoicing.basics
    title_key: rule.pl.invoicing.title
