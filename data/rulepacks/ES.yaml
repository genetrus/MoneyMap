is_placeholder: true
placeholder_notice_key: rulepack.placeholder.notice
rules:
  - rule_id: es.regulated.verify
    title_key: rule.es.regulated.title
    summary_key: rule.es.regulated.summary
    applies_if:
      tags_any: [regulated, finance, health]
    effects:
      add_kits: [es.registration, es.taxes, es.permits]
      add_blockers: [reason.review.requires_verification, reason.legal.placeholder_rulepack]
      add_checklist:
        - rulepack.es.verify.registration
        - rulepack.es.verify.taxes
        - rulepack.es.verify.permits
  - rule_id: es.invoicing.basics
    title_key: rule.es.invoicing.title
