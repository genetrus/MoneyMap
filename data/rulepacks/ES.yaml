        - rulepack.es.verify.invoicing
  - rule_id: es.data.coverage
    title_key: rule.es.data.title
    summary_key: rule.es.data.summary
    applies_if:
      tags_any: [remote, automation]
    effects:
      add_kits: [es.data_protection]
      add_checklist:
        - rulepack.es.verify.data_protection
  - rule_id: es.employment.contracting
    title_key: rule.es.employment.title
    summary_key: rule.es.employment.summary
    applies_if:
      tags_any: [community, service]
    effects:
      add_kits: [es.employment, es.insurance]
      add_checklist:
        - rulepack.es.verify.employment
        - rulepack.es.verify.insurance
